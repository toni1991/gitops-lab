apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: secrets-demo
  namespace: flux-system
spec:
  interval: 1m
  path: ./apps/secrets-demo
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: external-secrets
      namespace: flux-system
