apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-ingress
  namespace: istio-ingress
spec:
  interval: 10m
  chart:
    spec:
      chart: gateway
      version: '1.x'
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
  dependsOn:
    - name: istiod
      namespace: istio-system
  values:
    service:
      type: NodePort
      ports:
        - name: status-port
          port: 15021
          targetPort: 15021
          protocol: TCP
        - name: http2
          port: 80
          targetPort: 80
          nodePort: 30080
          protocol: TCP
        - name: https
          port: 443
          targetPort: 443
          nodePort: 30443
          protocol: TCP
    autoscaling:
      enabled: false
    replicaCount: 1
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Equal"
        effect: "NoSchedule"
